<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="sapphire">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="SpellRight — a minimal, distraction-free spelling trainer">
  <meta name="format-detection" content="telephone=no">
  <meta name="color-scheme" content="light dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SpellRight">
  <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000"  media="(prefers-color-scheme: dark)">
  <title>SpellRight</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheet load order: tokens → themes → reset → base → components →
       animations → screens → keyboard → responsive (responsive last = wins) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/keyboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell" id="app">
    <nav class="nav-rail" id="nav-rail" aria-label="Main navigation"></nav>
    <main class="screen-container" id="screen-container" role="main" aria-label="Content">
      <div class="boot-loader" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          width="36" height="36" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20l-7-3-7 3V2z"/>
        </svg>
      </div>
    </main>
    <nav class="nav-bar" id="nav-bar" aria-label="Main navigation"></nav>
  </div>

  <div class="toast-stack" id="toast-stack" role="status" aria-live="polite" aria-atomic="false"></div>
  <div class="overlay" id="modal-overlay" role="presentation" aria-hidden="true"></div>
  <div class="modal"   id="modal"         role="dialog" aria-modal="true" tabindex="-1"></div>

  <!-- Script load order: data → utils → services → state →
       components (icons first, keyboard last) → screens → app -->
  <script src="js/data/word-list.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/services/storage.js"></script>
  <script src="js/services/speech.js"></script>
  <script src="js/state/store.js"></script>
  <script src="js/components/icons.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/navigation.js"></script>
  <script src="js/components/charts.js"></script>
  <script src="js/components/keyboard.js"></script>
  <script src="js/screens/home.js"></script>
  <script src="js/screens/practice-hub.js"></script>
  <script src="js/screens/practice-session.js"></script>
  <script src="js/screens/words.js"></script>
  <script src="js/screens/statistics.js"></script>
  <script src="js/screens/settings.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
